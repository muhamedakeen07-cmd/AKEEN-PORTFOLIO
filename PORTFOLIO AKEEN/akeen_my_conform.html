<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akeen - My Content</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            border: 2px solid #333333;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            color: #a8b49f;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .login-box p {
            color: #b3b3b3;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #242424;
            color: #ffffff;
            border: 1px solid #333333;
            border-radius: 8px;
            font-size: 1rem;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #a855f7;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
        }

        .login-box button:hover {
            background: #d8b4fe;
            color: #0f0f0f;
        }

        .error-message {
            color: #dc2626;
            margin-bottom: 15px;
            display: none;
        }

        .main-content {
            display: none;
            padding: 20px;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(15, 15, 15, 0.95);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #333333;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #a855f7;
            text-decoration: none;
        }

        .logout-btn {
            background: #a855f7;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .container {
            max-width: 1000px;
            margin: 80px auto;
            padding: 20px;
        }

        .upload-form {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            border: 1px solid #333333;
        }

        .upload-form h2 {
            color: #a855f7;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d8b4fe;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #242424;
            color: #ffffff;
            border: 1px solid #333333;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: #a855f7;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #d8b4fe;
            color: #0f0f0f;
        }

        .section-title {
            font-size: 1.8rem;
            color: #a855f7;
            margin: 40px 0 20px 0;
            border-bottom: 2px solid #a855f7;
            padding-bottom: 10px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .content-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333333;
        }

        .content-card:hover {
            border-color: #a855f7;
            transform: translateY(-5px);
        }

        .content-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #a855f7, #d8b4fe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
        }

        .content-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content-info {
            padding: 20px;
        }

        .content-info h3 {
            margin-bottom: 10px;
            color: #d8b4fe;
        }

        .content-info p {
            color: #b3b3b3;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .content-type {
            display: inline-block;
            background: #242424;
            color: #a855f7;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .content-buttons {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            flex: 1;
            background: #a855f7;
            padding: 8px;
            text-align: center;
            border-radius: 20px;
            color: white;
            text-decoration: none;
        }

        .view-btn:hover {
            background: #d8b4fe;
            color: #0f0f0f;
        }

        .delete-btn {
            background: #dc2626;
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .empty-message {
            text-align: center;
            color: #b3b3b3;
            padding: 40px;
        }

        .alert {
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #a855f7;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #d8b4fe;
            display: none;
        }

        .alert.show {
            display: block;
        }
    </style>
</head>
<body>

    <!-- LOGIN PAGE -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>🔒 Admin Login</h1>
            <p>Default Password: <strong>password</strong></p>
            
            <div class="error-message" id="errorMessage">❌ Wrong password!</div>
            
            <input type="password" id="passwordInput" placeholder="Enter password">
            <button onclick="loginNow()">Login</button>
            
            <p style="margin-top: 20px; color: #808080;">Try: password</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">
        <nav>
            <a href="akeen_portfolio.html" class="nav-logo">Akeen</a>
            <button class="logout-btn" onclick="logoutNow()">🔓 Logout</button>
        </nav>

        <div class="container">
            <div class="alert" id="alert"></div>

            <div class="upload-form">
                <h2>📤 Add New Content</h2>
                
                <div class="form-group">
                    <label>Content Type</label>
                    <select id="contentType">
                        <option value="video">📹 Video</option>
                        <option value="image">🖼️ Image</option>
                        <option value="design">🎨 Design</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="e.g., ST.CALGROSE Brand Video">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="Describe your content..."></textarea>
                </div>

                <div class="form-group">
                    <label>Upload Image/Video</label>
                    <input type="file" id="fileUpload" accept="image/*,video/*">
                </div>

                <div class="form-group">
                    <label>Link (Optional)</label>
                    <input type="text" id="link" placeholder="https://instagram.com/st.calgrose">
                </div>

                <button onclick="addContentNow()">✨ Add Content</button>
            </div>

            <h2 class="section-title">📹 Videos</h2>
            <div class="content-grid" id="videoGrid">
                <div class="empty-message">No videos yet</div>
            </div>

            <h2 class="section-title">🖼️ Images</h2>
            <div class="content-grid" id="imageGrid">
                <div class="empty-message">No images yet</div>
            </div>

            <h2 class="section-title">🎨 Designs</h2>
            <div class="content-grid" id="designGrid">
                <div class="empty-message">No designs yet</div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'password';

        function loginNow() {
            const pwd = document.getElementById('passwordInput').value;
            const error = document.getElementById('errorMessage');

            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadAllContent();
                error.style.display = 'none';
            } else {
                error.style.display = 'block';
            }
        }

        function logoutNow() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function loadAllContent() {
            const data = JSON.parse(localStorage.getItem('akeen_content')) || [];
            
            document.getElementById('videoGrid').innerHTML = '';
            document.getElementById('imageGrid').innerHTML = '';
            document.getElementById('designGrid').innerHTML = '';

            const videos = data.filter(x => x.type === 'video');
            const images = data.filter(x => x.type === 'image');
            const designs = data.filter(x => x.type === 'design');

            if (videos.length === 0) document.getElementById('videoGrid').innerHTML = '<div class="empty-message">No videos yet</div>';
            else videos.forEach((item, i) => showCard(item, i, 'videoGrid'));

            if (images.length === 0) document.getElementById('imageGrid').innerHTML = '<div class="empty-message">No images yet</div>';
            else images.forEach((item, i) => showCard(item, i, 'imageGrid'));

            if (designs.length === 0) document.getElementById('designGrid').innerHTML = '<div class="empty-message">No designs yet</div>';
            else designs.forEach((item, i) => showCard(item, i, 'designGrid'));
        }

        function showCard(item, index, gridId) {
            const grid = document.getElementById(gridId);
            const card = document.createElement('div');
            card.className = 'content-card';
            card.innerHTML = `
                <div class="content-image">${item.file ? '<img src="' + item.file + '" alt="' + item.title + '">' : '📷'}</div>
                <div class="content-info">
                    <span class="content-type">${item.type.toUpperCase()}</span>
                    <h3>${item.title}</h3>
                    <p>${item.description}</p>
                    <div class="content-buttons">
                        ${item.link ? '<a href="' + item.link + '" target="_blank" class="view-btn">View →</a>' : ''}
                        <button class="delete-btn" onclick="deleteNow(${index})">Delete</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        function addContentNow() {
            const title = document.getElementById('title').value;
            const desc = document.getElementById('description').value;
            const type = document.getElementById('contentType').value;
            const link = document.getElementById('link').value;
            const file = document.getElementById('fileUpload').files[0];

            if (!title || !desc) {
                showMessage('❌ Fill title and description!');
                return;
            }

            if (!file) {
                showMessage('❌ Upload image or video!');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const obj = { title, description: desc, type, link, file: e.target.result };
                let arr = JSON.parse(localStorage.getItem('akeen_content')) || [];
                arr.push(obj);
                localStorage.setItem('akeen_content', JSON.stringify(arr));

                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                document.getElementById('link').value = '';
                document.getElementById('fileUpload').value = '';

                showMessage('✅ Content added!');
                loadAllContent();
            };
            reader.readAsDataURL(file);
        }

        function deleteNow(index) {
            if (confirm('Delete?')) {
                let arr = JSON.parse(localStorage.getItem('akeen_content')) || [];
                arr.splice(index, 1);
                localStorage.setItem('akeen_content', JSON.stringify(arr));
                loadAllContent();
                showMessage('🗑️ Deleted!');
            }
        }

        function showMessage(msg) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        // Enter key to login
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loginNow();
            });
        });
    </script>

</body>
</html>
